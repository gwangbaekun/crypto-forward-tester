name: Deploy Polymarket Worker (GCE VM)

# polymarket 관련 push → VM에서 git pull + systemd restart
# Secrets: PM_VM_HOST, PM_VM_USER, PM_VM_SSH_KEY

on:
  push:
    branches: [main]
    paths:
      - "src/polymarket_worker/**"
      - "src/features/strategy/polymarket/**"
      - "src/db/**"
      - "requirements.polymarket.txt"
      - "deploy/**"
      - "scripts/vm_deploy.sh"
      - "scripts/vm_install_polymarket.sh"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PM_VM_HOST }}
          username: ${{ secrets.PM_VM_USER }}
          key: ${{ secrets.PM_VM_SSH_KEY }}
          script_stop: true
          script: |
            sudo bash /opt/btc_forwardtest/scripts/vm_deploy.sh
