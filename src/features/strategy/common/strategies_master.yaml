# 전략 메타 — btc_forwardtest
# tradingview_mcp strategies_master.yaml 과 동일 구조
#
# 필드:
#   enabled:        false면 tick loop 미포함
#   monitoring:     대시보드 자동 polling 여부
#   tick_interval:  서버 background tick 주기 (초)
#   timeframes:     fetch할 TF 목록
#   telegram_alerts: Telegram 알림 on/off
#   discord_alerts:  Discord 알림 on/off
#   tick.module:    realtime_feed 모듈 경로
#   tick.fn:        호출할 함수명

atr_breakout:
  enabled: false
  monitoring: false
  tick_interval: 60
  timeframes: ["5m", "15m", "1h", "4h"]
  strategy_tag: atr_breakout
  label: "ATR Breakout"
  emoji: "💥"
  telegram_alerts: true
  discord_alerts: false
  binance_live: false
  tick:
    module: features.strategy.atr_breakout.realtime_feed
    fn: get_state

cvd_explosion:
  enabled: false
  monitoring: false
  symbol: "BTCUSDT"
  tick_interval: 10
  exit_tick_interval: 1.0
  timeframes: ["15m", "1h", "4h"]
  entry_tf: "15m"
  higher_tf: "4h"
  strategy_tag: cvd_explosion
  label: "CVD Explosion"
  emoji: "💣"
  telegram_alerts: false
  discord_alerts: false
  binance_live: false
  binance_leverage: 3
  tick:
    module: features.strategy.cvd_explosion.realtime_feed
    fn: get_state

eth_cvd_explosion:
  enabled: true
  monitoring: true
  symbol: "ETHUSDT"
  tick_interval: 10
  exit_tick_interval: 1.0
  timeframes: ["15m", "1h", "4h"]
  entry_tf: "1h"
  higher_tf: "4h"
  liq_interval: "1h"
  strategy_tag: eth_cvd_explosion
  label: "ETH CVD Explosion"
  emoji: "🔷"
  telegram_alerts: true
  discord_alerts: true
  binance_live: true
  binance_leverage: 3
  ctrader_live: true
  ctrader_account_id: 47198415  # FTMO live
  ctrader_env: live
  ctrader_symbol_id: 323        # ETHUSD on FTMO live
  tick:
    module: features.strategy.eth_cvd_explosion.forward_test_runner
    fn: get_state

eth_cvd_explosion_v2:
  enabled: true
  monitoring: true
  symbol: "ETHUSDT"
  tick_interval: 10
  exit_tick_interval: 1.0
  timeframes: ["15m", "1h"]
  entry_tf: "15m"
  higher_tf: "1h"
  liq_interval: "15m"
  strategy_tag: eth_cvd_explosion_v2
  label: "ETH CVD Explosion V2"
  emoji: "🔷"
  telegram_alerts: false
  discord_alerts: true
  binance_live: false
  binance_leverage: 3
  ctrader_live: true
  ctrader_account_id: 47028214  # demo
  ctrader_env: demo
  ctrader_symbol_id: 22397      # ETHUSD on demo
  tick:
    module: features.strategy.eth_cvd_explosion_v2.forward_test_runner
    fn: get_state

oi_cvd_surge:
  enabled: true
  monitoring: true
  symbol: "BTCUSDT"
  tick_interval: 60
  timeframes: ["1h"]
  entry_tf: "1h"
  strategy_tag: oi_cvd_surge
  label: "OI CVD Surge"
  emoji: "📈"
  telegram_alerts: true
  discord_alerts: true
  binance_live: false
  binance_leverage: 3
  tick:
    module: features.strategy.oi_cvd_surge.realtime_feed
    fn: get_state
