spc_oiaccel_combine:
  # combine 운영 스위치. tick 블록이 없어 strategy_loop는 자동 제외(tick 안 함).
  # enabled=true → 멤버 이벤트를 받아 주문 fan-out. false → 주문 스킵(끄기).
  # members = 어떤 전략이 묶였는지(단일 출처). venue별 사이징은 config.yaml(venues).
  enabled: true
  members:
    - spot_perp_cvd
    - oi_accel_breakout_v2
