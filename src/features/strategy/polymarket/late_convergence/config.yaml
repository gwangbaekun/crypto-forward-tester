enabled: true

poll_interval_sec: 300      # REST 스캔 주기 (5분)
max_scan_hours: 48          # 종료까지 최대 48시간 이내 마켓 전체 스캔
hours_before_end: 24        # 시그널 조건: 종료 24시간 이내
min_convergence_price: 0.80 # YES or NO ≥ 80% → 고확률 수렴 타겟
max_convergence_price: 0.97 # 이 이하 (완전 수렴 전, 수익 여지 있음)
min_volume_usd: 5000

# 진입 허용 섹터 화이트리스트 (sectors.py classify_sector 기준)
allow_sectors:
  - Esports_Prop    # Game/Map 단위 결과 — 91.8% WR, +7.24 pnl (실데이터)
  - Sports_Match    # FC 승부, NBA/NFL 경기 결과 — 91.4% WR, +4.65 pnl
  - Politics        # 선거, 상원, 대통령 등 — 100% WR
  - Economics       # 금리 결정, FOMC, 중앙은행 — 100% WR
  # Esports_Match 제거: 78.6% WR, -3.69 pnl (손실 섹터)
