enabled: true

poll_interval_sec: 300      # REST 스캔 주기 (5분)
max_scan_hours: 48          # 종료까지 최대 48시간 이내 마켓 전체 스캔
hours_before_end: 24        # 시그널 조건: 종료 24시간 이내
min_convergence_price: 0.10 # YES or NO ≥ 10% → 가격 낮을수록 최소 비용 $1~2
max_convergence_price: 0.40 # 이 이하 (5 shares × 0.40 = $2.00)
min_volume_usd: 5000
max_order_usd: 2.0          # 포지션당 최대 지출 — 이 이상이면 skip
