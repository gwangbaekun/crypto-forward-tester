strategy_id: spot_perp_cvd
strategy_name: Spot-Perp CVD Divergence (ETH 1h)
timeframes:
  all:
  - 1h
  entry_tf: 1h
signal:
  # ── 진입 모드 ──────────────────────────────────────────────────────────────
  # divergence : Spot CVD↑ + Perp CVD↓ (방향 반대)
  # spread     : Spot leads Perp — (spot - perp) spread >= threshold
  # zscore     : Spread z-score >= z_threshold σ (TF 자동 정규화)
  # combined   : 방향 반대 + spread 합산
  # composite  : normalized score
  mode: spread

  lookback: 20                   # CVD 롤링 윈도우 (봉 수) — ~20시간 = 하루 거래일
  spot_cvd_threshold: 3.5        # spread 모드: spot CVD% 절댓값 최소 기준
  perp_cvd_threshold: 1.3        # divergence 모드용 (spread 모드에서는 미사용)
  confidence_threshold: 1

  # Spot leads Perp (spread 모드) 파라미터
  spread_threshold: 5.0          # spot_cvd% - perp_cvd% >= ±5% 시 진입

  # 롱/숏 별도 threshold (~ 미설정 시 spot/perp_cvd_threshold 사용)
  long_spot_threshold: ~
  long_perp_threshold: ~
  short_spot_threshold: ~
  short_perp_threshold: 2.0      # 숏 진입 시 perp CVD threshold (선택적 강화)

  # ── 레짐 필터 (0 = disabled) ───────────────────────────────────────────────
  atr_min_pct: 1.0               # ATR% >= 1.0% 봉에만 진입 (변동성 필터)
  atr_period: 7                  # 7봉 = ~7시간 (반 거래일 단위 변동성)

  ema_period: 0                  # 0 = 비활성. 추세 필터 필요 시 50 또는 100

  volume_ratio_min: 1.5          # 현재 거래량 >= 롤링 평균 x 1.5
  vol_lookback: 20               # 거래량 평균 계산 기간 (봉 수)

  adx_min: 0.0                   # 0 = 비활성. 추세 강도 필터 필요 시 15~25
  adx_period: 14

  cvd_mom_lookback: 4            # Spot CVD%가 4봉 전보다 클 때만 (다이버전스 성장 중)

  invert_signal: false           # true = perp leads 가설 (LONG/SHORT 반전)

  # ── zscore 모드 파라미터 ────────────────────────────────────────────────────
  z_threshold: 1.5               # spread z-score 진입 기준 (sigma 단위)
  z_period: 0                    # 0 = lookback x 3 자동 설정

tpsl:
  mode: cvd_exit
  sl_pct: 3.0                    # Hard SL: 진입가 +/- 3%
  tp_ratio: 3.0                  # TP = SL거리 x 3 (= 9%) / 0 = 비활성
  trail_pct: 0.0                 # Trailing Stop % / 0 = 비활성
  min_hold_bars: 4               # CVD exit 최소 홀딩 봉 수 (노이즈 청산 방지)
  slippage_pct: 0.05

exit: {}
forward_test:
  entry_source:
  - engine
