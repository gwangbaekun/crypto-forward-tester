strategy_id: spc_oiaccel_combine
strategy_name: SPC + OI-Accel Combine (venue별 사이징 운용)

# combine은 신호를 모른다. 멤버 전략 이벤트를 받아 venue별 notional_ratio·leverage로 주문만 한다.
# MDD는 notional_ratio가 결정(레버리지 아님). 백테스트 기준선 oi 0.5/spc 0.75 → MDD 8.36%.
venues:
  binance:
    enabled: true
    leverage: 9
    members:
      oi_accel_breakout_v2: { notional_ratio: 2.0 }   # 노출 2× equity, 9x → 증거금 0.22 equity. 합산 MDD ~30%
      spot_perp_cvd:        { notional_ratio: 3.0 }   # 노출 3× equity, 9x → 증거금 0.33 equity
  ctrader:
    enabled: true         # ctrader_accounts.yaml의 enabled 계좌 전체에 fan-out (로컬은 _local_connect_allowed()가 자동 차단)
    leverage: 3
    # account/symbol/lot은 src/common/ctrader_accounts.yaml 에서 관리
    members:
      oi_accel_breakout_v2: { notional_ratio: 0.42 }  # 합산 MDD ~7%
      spot_perp_cvd:        { notional_ratio: 0.62 }
