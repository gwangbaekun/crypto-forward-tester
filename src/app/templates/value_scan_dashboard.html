<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Value Scan — Forward Test</title>
<link rel="stylesheet" href="/static/css/dashboard_common.css">
<style>
  .container { max-width: 1100px; }

  .summary-row {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .stat-card {
    flex: 1; min-width: 110px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; text-align: center;
  }
  .stat-card .val {
    font-size: 1.5rem; font-weight: 700; color: var(--text-primary); line-height: 1.1;
  }
  .stat-card .lbl {
    font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase;
    letter-spacing: 0.08em; margin-top: 3px;
  }
  .val.green  { color: #3fb950; }
  .val.red    { color: #f85149; }
  .val.yellow { color: #d29922; }

  .tab-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
  .tab-btn {
    padding: 6px 14px; font-size: 0.78rem; font-weight: 600; border: none;
    background: none; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent;
    transition: color .15s;
  }
  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  thead th {
    text-align: left; padding: 5px 8px; font-size: 0.67rem; font-weight: 600;
    letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-secondary);
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  th.r, td.r { text-align: right; }
  tbody tr { border-bottom: 1px solid rgba(48,54,61,0.5); transition: background .1s; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  tbody td { padding: 6px 8px; color: var(--text-primary); white-space: nowrap; }
  td.muted  { color: var(--text-secondary); font-size: 0.72rem; }
  td.name   { font-weight: 600; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }

  .badge {
    display: inline-flex; align-items: center; padding: 1px 7px;
    border-radius: 4px; font-size: 0.67rem; font-weight: 700; letter-spacing: 0.04em;
  }
  .badge-buy  { background: rgba(63,185,80,0.15);  color: #3fb950; }
  .badge-sell { background: rgba(248,81,73,0.15);  color: #f85149; }
  .badge-hold { background: rgba(139,148,158,0.12); color: #8b949e; }

  .pnl-pos { color: #3fb950; font-weight: 600; }
  .pnl-neg { color: #f85149; font-weight: 600; }
  .per-low  { color: #3fb950; font-weight: 600; }
  .per-high { color: #f85149; }
  .dash { color: #444d56; }

  .market-pill {
    display: inline-flex; padding: 1px 6px; border-radius: 10px; font-size: 0.65rem;
    font-weight: 700; letter-spacing: 0.06em;
  }
  .market-kospi  { background: rgba(74,144,217,0.15); color: #4a90d9; }
  .market-nasdaq { background: rgba(163,113,247,0.15); color: #a371f7; }

  .scan-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .scan-info { font-size: 0.72rem; color: var(--text-secondary); }
  #scan-spinner { display: none; }
  .spinner {
    width: 14px; height: 14px; border: 2px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin .7s linear infinite; display: inline-block; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 32px; color: var(--text-secondary); font-size: 0.82rem; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="card" style="padding:12px 14px">
    <div class="main-header">
      <div class="header-left">
        <span class="strategy-tag">Value Scan</span>
        <span class="symbol-badge">KOSPI + S&amp;P 500</span>
        <span class="status-dot" id="dot" style="background:#444d56"></span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <a href="/" class="back">← Home</a>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="summary-row" id="stats-row">
    <div class="stat-card"><div class="val" id="s-open">—</div><div class="lbl">Open</div></div>
    <div class="stat-card"><div class="val" id="s-closed">—</div><div class="lbl">Closed</div></div>
    <div class="stat-card"><div class="val" id="s-winrate">—</div><div class="lbl">Win Rate</div></div>
    <div class="stat-card"><div class="val" id="s-avgpnl">—</div><div class="lbl">Avg P&amp;L</div></div>
  </div>

  <!-- Scan control -->
  <div class="card" style="padding:10px 14px">
    <div class="scan-bar">
      <span class="ctrl-label">Scan</span>
      <button class="primary" onclick="triggerScan('all')">▶ Run All</button>
      <button onclick="triggerScan('kospi')">KOSPI</button>
      <button onclick="triggerScan('nasdaq')">NASDAQ</button>
      <span id="scan-spinner"><span class="spinner"></span></span>
      <span class="scan-info" id="scan-info">—</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="card">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('positions', this)">Open Positions</button>
      <button class="tab-btn" onclick="switchTab('history', this)">History</button>
    </div>

    <!-- Positions -->
    <div class="tab-pane active" id="tab-positions">
      <table id="pos-table">
        <thead>
          <tr>
            <th>Market</th><th>Symbol</th><th class="name-col">Name</th><th>Sector</th>
            <th class="r">Entry</th><th class="r">Current</th><th class="r">P&L</th>
            <th class="r">PER</th><th class="r">Median</th><th class="r">Fwd EPS</th>
            <th>Since</th>
          </tr>
        </thead>
        <tbody id="pos-tbody"><tr><td colspan="11" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>

    <!-- History -->
    <div class="tab-pane" id="tab-history">
      <table id="hist-table">
        <thead>
          <tr>
            <th>Market</th><th>Symbol</th><th class="name-col">Name</th>
            <th class="r">Entry</th><th class="r">Exit</th><th class="r">P&L</th>
            <th class="r">Days</th><th>Reason</th><th>Entry Date</th><th>Exit Date</th>
          </tr>
        </thead>
        <tbody id="hist-tbody"><tr><td colspan="10" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const BASE = "/quant/value_scan";
let pollTimer = null;

function switchTab(name, btn) {
  document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`tab-${name}`).classList.add("active");
  btn.classList.add("active");
}

function fmt(v, dec = 1) {
  if (v == null) return '<span class="dash">—</span>';
  return Number(v).toFixed(dec);
}

function fmtPrice(v, market) {
  if (v == null) return '<span class="dash">—</span>';
  return market === "kospi"
    ? Number(v).toLocaleString("ko-KR")
    : Number(v).toFixed(2);
}

function pnlHtml(v) {
  if (v == null) return '<span class="dash">—</span>';
  const cls = v >= 0 ? "pnl-pos" : "pnl-neg";
  const sign = v >= 0 ? "+" : "";
  return `<span class="${cls}">${sign}${Number(v).toFixed(2)}%</span>`;
}

function marketPill(m) {
  return m === "kospi"
    ? `<span class="market-pill market-kospi">KOSPI</span>`
    : `<span class="market-pill market-nasdaq">NASDAQ</span>`;
}

async function loadStats() {
  const d = await fetch(`${BASE}/stats`).then(r => r.json());
  const dot = document.getElementById("dot");

  document.getElementById("s-open").textContent    = d.open_count  ?? "—";
  document.getElementById("s-closed").textContent  = d.closed_count ?? "—";

  const wr = document.getElementById("s-winrate");
  wr.textContent = d.win_rate != null ? `${d.win_rate}%` : "—";
  wr.className = "val" + (d.win_rate >= 50 ? " green" : d.win_rate != null ? " red" : "");

  const ap = document.getElementById("s-avgpnl");
  ap.textContent = d.avg_pnl_pct != null ? `${d.avg_pnl_pct > 0 ? "+" : ""}${d.avg_pnl_pct}%` : "—";
  ap.className = "val" + (d.avg_pnl_pct > 0 ? " green" : d.avg_pnl_pct != null ? " red" : "");

  if (d.last_scan_at) {
    const dt = new Date(d.last_scan_at);
    document.getElementById("scan-info").textContent = `Last scan: ${dt.toLocaleString()}`;
  }
  dot.style.background = d.scan_running ? "#d29922" : "#3fb950";
}

async function loadPositions() {
  const d  = await fetch(`${BASE}/positions`).then(r => r.json());
  const tb = document.getElementById("pos-tbody");
  if (!d.positions.length) {
    tb.innerHTML = `<tr><td colspan="11" class="empty">No open positions</td></tr>`;
    return;
  }
  tb.innerHTML = d.positions.map(p => {
    const perCls = p.per < (p.sector_median || 999) ? "per-low" : "per-high";
    return `<tr>
      <td>${marketPill(p.market)}</td>
      <td><b>${p.symbol}</b></td>
      <td class="name muted">${p.name}</td>
      <td class="muted">${p.sector || "—"}</td>
      <td class="r">${fmtPrice(p.entry_price, p.market)}</td>
      <td class="r">${fmtPrice(p.current_price, p.market)}</td>
      <td class="r">${pnlHtml(p.pnl_pct)}</td>
      <td class="r ${perCls}">${fmt(p.per)}</td>
      <td class="r muted">${fmt(p.sector_median)}</td>
      <td class="r">${fmt(p.fwd_eps, 2)}</td>
      <td class="muted">${p.entry_date || "—"}</td>
    </tr>`;
  }).join("");
}

async function loadHistory() {
  const d  = await fetch(`${BASE}/history`).then(r => r.json());
  const tb = document.getElementById("hist-tbody");
  if (!d.history.length) {
    tb.innerHTML = `<tr><td colspan="10" class="empty">No closed trades yet</td></tr>`;
    return;
  }
  tb.innerHTML = d.history.map(h => {
    const reason = h.exit_reason || "—";
    const reasonCls = reason === "SELL" ? "badge badge-sell"
                    : reason === "HOLD" ? "badge badge-hold"
                    : "badge badge-hold";
    return `<tr>
      <td>${marketPill(h.market)}</td>
      <td><b>${h.symbol}</b></td>
      <td class="name muted">${h.name}</td>
      <td class="r">${fmtPrice(h.entry_price, h.market)}</td>
      <td class="r">${fmtPrice(h.exit_price, h.market)}</td>
      <td class="r">${pnlHtml(h.pnl_pct)}</td>
      <td class="r muted">${h.hold_days ?? "—"}</td>
      <td><span class="${reasonCls}">${reason}</span></td>
      <td class="muted">${h.entry_date || "—"}</td>
      <td class="muted">${h.exit_date  || "—"}</td>
    </tr>`;
  }).join("");
}

async function triggerScan(market) {
  const spinner = document.getElementById("scan-spinner");
  const info    = document.getElementById("scan-info");
  spinner.style.display = "inline";
  info.textContent = "Scanning…";
  document.getElementById("dot").style.background = "#d29922";

  try {
    const r = await fetch(`${BASE}/scan?market=${market}`, { method: "POST" });
    const d = await r.json();
    if (d.error) {
      info.textContent = d.error;
      spinner.style.display = "none";
      return;
    }
    info.textContent = "Scan started…";
    pollScanStatus();
  } catch (e) {
    info.textContent = `Error: ${e}`;
    spinner.style.display = "none";
  }
}

function pollScanStatus() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const d = await fetch(`${BASE}/scan/status`).then(r => r.json());
    if (!d.running) {
      clearInterval(pollTimer);
      document.getElementById("scan-spinner").style.display = "none";
      document.getElementById("dot").style.background = "#3fb950";
      await Promise.all([loadStats(), loadPositions(), loadHistory()]);
    }
  }, 3000);
}

async function init() {
  await Promise.all([loadStats(), loadPositions(), loadHistory()]);
  // 스캔 중이면 자동으로 polling 시작
  const s = await fetch(`${BASE}/scan/status`).then(r => r.json());
  if (s.running) {
    document.getElementById("scan-spinner").style.display = "inline";
    pollScanStatus();
  }
}

init();
</script>
</body>
</html>
