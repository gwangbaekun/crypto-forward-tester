<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deribit Expiry GEX Reversal — Forward Test</title>
    <meta name="deribit-gex-reversal-monitoring-start" content="{% if monitoring_start_by_default is defined %}{{ monitoring_start_by_default|tojson }}{% else %}true{% endif %}">
    <script>
      window.GEX_MONITORING_START = document.querySelector('meta[name="deribit-gex-reversal-monitoring-start"]').getAttribute('content') === 'true';
    </script>
    <link rel="stylesheet" href="/static/css/dashboard_common.css">
    <script src="/static/js/forward_test_dashboard.js?v=4"></script>
</head>
<body>
<div class="container">

    <div class="card" style="padding:12px 14px;">
        <div class="main-header">
            <div class="header-left">
                <span class="strategy-tag">🎯 Deribit GEX Reversal</span>
                <span class="symbol-badge" id="symbol-label">BTCUSDT</span>
                <span class="status-dot" id="dot"></span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <span class="price-display" id="price">—</span>
                <a href="/" class="back">← Home</a>
            </div>
        </div>
    </div>

    <div class="card" style="padding:10px 14px">
        <div class="ctrl">
            <span class="ctrl-label">Monitor</span>
            <button id="btn-toggle" class="primary" onclick="toggleMonitor()">Start</button>
            <button onclick="loadOnce()">Refresh</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Signal (Expiry GEX Reversal · 08:00 UTC)</div>
        <div class="signal-row">
            <span class="signal-badge none" id="sig-badge">Idle</span>
        </div>
        <div class="metrics-grid" style="margin-top:14px">
            <div class="metric"><span class="metric-key">Expiry</span><span class="metric-val" id="m-expiry">—</span></div>
            <div class="metric"><span class="metric-key">Type</span><span class="metric-val" id="m-type">—</span></div>
            <div class="metric"><span class="metric-key">GEX ($bn/1%)</span><span class="metric-val" id="m-gex">—</span></div>
            <div class="metric"><span class="metric-key">r_pre (bp)</span><span class="metric-val" id="m-rpre">—</span></div>
            <div class="metric"><span class="metric-key">|r_pre| pctl</span><span class="metric-val" id="m-pctl">—</span></div>
            <div class="metric"><span class="metric-key">ATM OI %</span><span class="metric-val" id="m-atm">—</span></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Reasons</div>
        <ul class="reasons-list" id="reasons-list"><li>—</li></ul>
    </div>

    <div class="card">
        <div class="step-label">Forward Test</div>
        <div class="card-header">
            <span>🤖 Forward test P&amp;L</span>
            <div style="display:flex;gap:6px;align-items:center;">
                <button onclick="location.href='/quant/deribit_gex_reversal/forward_test/trades?symbol=BTCUSDT'"
                        style="font-size:0.72rem;padding:3px 8px;">All trades</button>
                <button onclick="location.href='/quant/deribit_gex_reversal/signal/logs/view?symbol=BTCUSDT'"
                        style="font-size:0.72rem;padding:3px 8px;">Signal log</button>
            </div>
        </div>
        <div id="forward-stats" style="min-height:60px;color:var(--text-secondary);">Loading…</div>
        <div id="forward-trades-box" style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border-color);">
            <div style="font-size:0.8rem;font-weight:bold;margin-bottom:8px;color:var(--text-primary);">📋 Recent trades</div>
            <div id="forward-trades-list" style="font-size:0.75rem;color:var(--text-secondary);">Loading…</div>
            <div id="forward-trades-pagination" style="margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;"></div>
        </div>
    </div>

</div>

<script>
(function() {
    var SYMBOL = 'BTCUSDT';
    var timer = null;
    var running = false;

    function toggleMonitor() {
        running = !running;
        var btn = document.getElementById('btn-toggle');
        if (running) {
            btn.textContent = 'Stop'; btn.className = 'active';
            document.getElementById('dot').className = 'dot live';
            loadOnce();
            timer = setInterval(loadOnce, 60000);
        } else {
            btn.textContent = 'Start'; btn.className = 'primary';
            document.getElementById('dot').className = 'dot';
            clearInterval(timer); timer = null;
        }
    }
    window.toggleMonitor = toggleMonitor;

    function loadOnce() {
        fetch('/api/market-stream?symbol=' + SYMBOL, { cache: 'no-store' })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                var lower = SYMBOL.toLowerCase();
                var row = (((d || {}).marks || {}).symbols || {})[lower];
                if (row && row.price != null) {
                    document.getElementById('price').textContent =
                        '$' + Number(row.price).toLocaleString(undefined, { minimumFractionDigits: 1 });
                }
            }).catch(function() {});

        fetch('/quant/deribit_gex_reversal/realtime_state?symbol=' + SYMBOL)
            .then(function(r) { return r.json(); })
            .then(function(d) {
                renderSignal(d.signal || {});
            }).catch(function() {});

        if (window.ForwardTestDashboard && !window.__GEX_FWD_INITED) {
            window.__GEX_FWD_INITED = true;
            window.ForwardTestDashboard.init({
                basePath: '/quant/deribit_gex_reversal',
                symbolFn: function() { return SYMBOL; },
                strategyTag: null,
                statsElId: 'forward-stats',
                tradesListElId: 'forward-trades-list',
                tradesPagerElId: 'forward-trades-pagination',
                pollMs: 60000,
                onStatsFetch: function() {},
                onTradesFetch: function() {},
            });
        }
    }
    window.loadOnce = loadOnce;

    function renderSignal(sig) {
        var signal = sig.signal || 'none';
        var badge = document.getElementById('sig-badge');
        badge.textContent = signal === 'long' ? '📈 LONG' : signal === 'short' ? '📉 SHORT' : 'Idle';
        badge.className = 'signal-badge ' + signal;

        document.getElementById('m-expiry').textContent = sig.expiry || '—';
        document.getElementById('m-type').textContent   = sig.type || '—';
        document.getElementById('m-gex').textContent    = sig.gex_bn != null ? Number(sig.gex_bn).toFixed(2) : '—';
        document.getElementById('m-rpre').textContent   = sig.r_pre_bp != null ? Number(sig.r_pre_bp).toFixed(0) : '—';
        document.getElementById('m-pctl').textContent   = sig.rpre_pctl != null ? Number(sig.rpre_pctl).toFixed(0) + '%' : '—';
        document.getElementById('m-atm').textContent    = sig.atm_pct != null ? Number(sig.atm_pct).toFixed(0) + '%' : '—';

        var reasons = sig.reasons || [];
        var ul = document.getElementById('reasons-list');
        ul.innerHTML = reasons.length
            ? reasons.map(function(r) { return '<li>' + r + '</li>'; }).join('')
            : '<li>—</li>';
    }

    if (window.GEX_MONITORING_START !== false) {
        toggleMonitor();
    } else {
        loadOnce();
    }
})();
</script>
</body>
</html>
