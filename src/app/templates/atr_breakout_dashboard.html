<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnet Sweep v6 — ATR Compression + Breakout</title>
    <meta name="atr-breakout-monitoring-start" content="{% if monitoring_start_by_default is defined %}{{ monitoring_start_by_default|tojson }}{% else %}true{% endif %}">
    <script>
      window.ATR_BREAKOUT_MONITORING_START = document.querySelector('meta[name="atr-breakout-monitoring-start"]').getAttribute('content') === 'true';
    </script>
    <link rel="stylesheet" href="/static/css/dashboard_common.css">
    <script src="/static/js/forward_test_dashboard.js?v=3"></script>
</head>
<body>
<div class="container">

    <!-- Header (Renaissance style) -->
    <div class="card" style="padding:12px 14px;">
        <div class="main-header">
            <div class="header-left">
                <span class="strategy-tag" id="version-label">ATR Breakout</span>
                <span class="symbol-badge" id="symbol-label">BTCUSDT</span>
                <span class="status-dot" id="dot"></span>
                <span id="version-toggle" style="font-size:0.75rem;display:flex;gap:4px;margin-left:6px;"></span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <span class="price-display" id="price">—</span>
                <a href="/" class="back">← Home</a>
            </div>
        </div>
    </div>

    <div class="card" style="padding:10px 14px">
        <div class="ctrl">
            <span class="ctrl-label">Monitor</span>
            <button id="btn-toggle" class="primary" onclick="toggleMonitor()">Start</button>
            <button onclick="loadOnce()">Refresh</button>
            <select id="symbol-sel" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-size:0.82rem" onchange="onSymbolChange()">
                <option value="BTCUSDT">BTCUSDT</option>
                <option value="ETHUSDT">ETHUSDT</option>
            </select>
        </div>
    </div>

    <!-- Signal -->
    <div class="card">
        <div class="card-title">Signal (ATR compression + breakout)</div>
        <div class="signal-row">
            <span class="signal-badge none" id="sig-badge">Idle</span>
            <div class="conf-bar-wrap">
                <div class="conf-label">Confidence <span id="conf-text">0/7</span></div>
                <div class="conf-bar"><div class="conf-fill" id="conf-fill" style="width:0%"></div></div>
            </div>
        </div>
        <div class="metrics-grid" style="margin-top:14px">
            <div class="metric"><span class="metric-key">ATR squeeze</span><span class="metric-val" id="m-compress">—</span></div>
            <div class="metric"><span class="metric-key">CVD 15m</span><span class="metric-val" id="m-cvd15">—</span></div>
            <div class="metric"><span class="metric-key">CVD 1h</span><span class="metric-val" id="m-cvd1h">—</span></div>
            <div class="metric"><span class="metric-key">TP</span><span class="metric-val" id="m-tp">—</span></div>
            <div class="metric"><span class="metric-key">SL</span><span class="metric-val" id="m-sl">—</span></div>
        </div>
        <!-- Box Viz -->
        <div class="box-viz" id="box-viz" style="display:none">
            <div class="box-row">
                <span class="box-high">▲ Box High: <span id="box-high-val">—</span></span>
                <span class="box-curr">Mark: <span id="box-curr-val">—</span></span>
                <span class="box-low">▼ Box Low: <span id="box-low-val">—</span></span>
            </div>
        </div>
    </div>

    <!-- Reasons -->
    <div class="card">
        <div class="card-title">Score breakdown</div>
        <ul class="reasons-list" id="reasons-list"><li>—</li></ul>
    </div>

    <!-- Position -->
    <div class="card">
        <div class="card-title" id="pos-title">Open position</div>
        <div id="pos-content"><p class="no-pos">No position</p></div>
    </div>

    <!-- ── Forward Test (Renaissance UI) ── -->
    <div class="card">
        <div class="step-label">Forward Test</div>
        <div class="card-header">
            <span>🤖 Forward test P&amp;L</span>
            <button onclick="location.href='/quant/atr_breakout/forward_test/trades?symbol=' + encodeURIComponent(window.__ATR_BREAKOUT_SYMBOL || 'BTCUSDT')"
                    style="font-size:0.72rem;padding:3px 8px;">All trades</button>
        </div>
        <div id="forward-stats" style="min-height:60px;color:var(--text-secondary);">Loading…</div>
        <div id="forward-trades-box" style="margin-top:14px; padding-top:14px; border-top:1px solid var(--border-color);">
            <div style="font-size:0.8rem;font-weight:bold;margin-bottom:8px;color:var(--text-primary);">📋 Recent trades</div>
            <div id="forward-trades-list" style="font-size:0.75rem;color:var(--text-secondary);">Loading…</div>
            <div id="forward-trades-pagination" style="margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;"></div>
        </div>
    </div>

</div>

<script>
(function() {
    var _params       = new URLSearchParams(window.location.search);
    var SYMBOL        = _params.get('symbol') || 'BTCUSDT';
    var STRATEGY_TAG  = _params.get('strategy_tag') || null;  // e.g. "atr_breakout_v2"
    var timer         = null;
    var running       = false;
    window.__ATR_BREAKOUT_SYMBOL = SYMBOL;

    // 버전 토글 렌더링
    (function() {
        var isV2 = STRATEGY_TAG === 'atr_breakout_v2';
        document.getElementById('version-label').textContent = isV2 ? 'ATR Breakout v2 💥' : 'ATR Breakout v1';
        var toggle = document.getElementById('version-toggle');
        var v1Url = window.location.pathname;
        var v2Url = window.location.pathname + '?strategy_tag=atr_breakout_v2';
        toggle.innerHTML =
            '<a href="' + v1Url + '" style="padding:2px 7px;border-radius:4px;font-size:0.72rem;text-decoration:none;' +
            (!isV2 ? 'background:#3a86ff;color:#fff;' : 'color:var(--text-secondary);border:1px solid var(--border-color);') + '">v1</a>' +
            '<a href="' + v2Url + '" style="padding:2px 7px;border-radius:4px;font-size:0.72rem;text-decoration:none;' +
            (isV2  ? 'background:#3a86ff;color:#fff;' : 'color:var(--text-secondary);border:1px solid var(--border-color);') + '">v2</a>';
    })();

    function onSymbolChange() {
        SYMBOL = document.getElementById('symbol-sel').value;
        window.__ATR_BREAKOUT_SYMBOL = SYMBOL;
        document.getElementById('symbol-label').textContent = SYMBOL;
        loadOnce();
    }
    window.onSymbolChange = onSymbolChange;

    function toggleMonitor() {
        running = !running;
        var btn = document.getElementById('btn-toggle');
        if (running) {
            btn.textContent = 'Stop'; btn.className = 'active';
            document.getElementById('dot').className = 'dot live';
            loadOnce();
            timer = setInterval(loadOnce, 30000);
        } else {
            btn.textContent = 'Start'; btn.className = 'primary';
            document.getElementById('dot').className = 'dot';
            clearInterval(timer);
        }
    }
    window.toggleMonitor = toggleMonitor;

    function loadOnce() {
        var _stateUrl = '/quant/atr_breakout/realtime_state?symbol=' + SYMBOL;
        if (STRATEGY_TAG) _stateUrl += '&strategy_tag=' + encodeURIComponent(STRATEGY_TAG);
        fetch(_stateUrl)
            .then(function(r) { return r.json(); })
            .then(function(d) {
                document.getElementById('price').textContent = d.current_price
                    ? '$' + Number(d.current_price).toLocaleString(undefined,{minimumFractionDigits:1}) : '—';
                renderSignal(d.signal || {}, d.current_price);
            }).catch(function() {});

        // Forward Test UI (shared, Renaissance-style)
        if (window.ForwardTestDashboard && !window.__ATR_BREAKOUT_FWD_INITED) {
            window.__ATR_BREAKOUT_FWD_INITED = true;
            window.ForwardTestDashboard.init({
                basePath:    '/quant/atr_breakout',
                symbolFn:    function () { return SYMBOL; },
                strategyTag: STRATEGY_TAG,
                statsElId:   'forward-stats',
                tradesListElId:  'forward-trades-list',
                tradesPagerElId: 'forward-trades-pagination',
                pollMs: 30000,
            });
        }

        // Keep local "현재 포지션" panel driven by forward_test/stats
        var _statsUrl = '/quant/atr_breakout/forward_test/stats?symbol=' + SYMBOL;
        if (STRATEGY_TAG) _statsUrl += '&strategy_tag=' + encodeURIComponent(STRATEGY_TAG);
        fetch(_statsUrl)
            .then(function(r) { return r.json(); })
            .then(function(d) {
                renderPosition(d.current_position);
            }).catch(function() {});
    }
    window.loadOnce = loadOnce;

    function renderSignal(sig, currentPrice) {
        var signal = sig.signal || 'none';
        var isV3Like = sig.signal_mode === 'v3';
        var bull   = sig.bull_score || 0;
        var bear   = sig.bear_score || 0;
        var conf   = sig.confidence != null
            ? Number(sig.confidence)
            : (signal === 'long' ? bull : signal === 'short' ? bear : Math.max(bull, bear));
        var maxConf = isV3Like ? 1 : 7;

        var badge = document.getElementById('sig-badge');
        badge.textContent = signal === 'long' ? '📈 LONG' : signal === 'short' ? '📉 SHORT' : 'Idle';
        badge.className   = 'signal-badge ' + signal;

        if (isV3Like) conf = signal === 'none' ? 0 : 1;
        document.getElementById('conf-text').textContent = conf + '/' + maxConf;
        document.getElementById('conf-fill').style.width = Math.min(100, (maxConf ? (conf / maxConf * 100) : 0)) + '%';

        // v1/v2: ATR 압축, v3: OI 증가 여부를 동일 슬롯에 표시
        var comp = isV3Like ? sig.oi_increasing : sig.is_compressed;
        var compEl = document.getElementById('m-compress');
        compEl.textContent = isV3Like
            ? (comp === true ? '✅ OI↑' : comp === false ? '❌ OI—' : '—')
            : (comp === true ? '✅ Squeeze' : comp === false ? '❌ No squeeze' : '—');
        compEl.className = 'metric-val' + (comp ? ' up' : '');

        // v1/v2: 15m/1h CVD, v3: 단일 CVD
        var cvd15 = isV3Like ? sig.cvd : sig.cvd_15m;
        var el15 = document.getElementById('m-cvd15');
        el15.textContent = cvd15 != null ? (cvd15 > 0 ? '↑ ' : cvd15 < 0 ? '↓ ' : '') + Math.round(cvd15) : '—';
        el15.className   = 'metric-val' + (cvd15 > 0 ? ' up' : cvd15 < 0 ? ' down' : '');

        var cvd1h = isV3Like ? null : sig.cvd_1h;
        var el1h = document.getElementById('m-cvd1h');
        el1h.textContent = cvd1h != null ? (cvd1h > 0 ? '↑ ' : cvd1h < 0 ? '↓ ' : '') + Math.round(cvd1h) : '—';
        el1h.className   = 'metric-val' + (cvd1h > 0 ? ' up' : cvd1h < 0 ? ' down' : '');

        document.getElementById('m-tp').textContent = sig.tp ? '$' + Number(sig.tp).toLocaleString() : '—';
        document.getElementById('m-sl').textContent = sig.sl ? '$' + Number(sig.sl).toLocaleString() : '—';

        // Box viz
        var bh = sig.box_high, bl = sig.box_low;
        if (bh && bl) {
            document.getElementById('box-viz').style.display = 'block';
            document.getElementById('box-high-val').textContent = '$' + Number(bh).toLocaleString();
            document.getElementById('box-low-val').textContent  = '$' + Number(bl).toLocaleString();
            document.getElementById('box-curr-val').textContent = currentPrice ? '$' + Number(currentPrice).toLocaleString(undefined,{minimumFractionDigits:1}) : '—';
        } else {
            document.getElementById('box-viz').style.display = 'none';
        }

        // v3일 때 라벨 교체 (표시만) — HTML 구조는 그대로
        if (isV3Like) {
            var titleEl = document.querySelector('.card .card-title');
            if (titleEl) titleEl.textContent = 'Signal (Magnet zone — OI + CVD)';
            var keys = document.querySelectorAll('.metrics-grid .metric-key');
            if (keys && keys.length >= 3) {
                keys[0].textContent = 'OI rising';
                keys[1].textContent = 'CVD';
                keys[2].textContent = '—';
            }
        } else {
            var titleEl2 = document.querySelector('.card .card-title');
            if (titleEl2) titleEl2.textContent = 'Signal (ATR compression + breakout)';
            var keys2 = document.querySelectorAll('.metrics-grid .metric-key');
            if (keys2 && keys2.length >= 3) {
                keys2[0].textContent = 'ATR squeeze';
                keys2[1].textContent = 'CVD 15m';
                keys2[2].textContent = 'CVD 1h';
            }
        }

        var reasons = sig.reasons || [];
        var ul = document.getElementById('reasons-list');
        ul.innerHTML = reasons.length
            ? reasons.map(function(r) { return '<li>' + r + '</li>'; }).join('')
            : '<li>—</li>';
    }

    function renderPosition(pos) {
        var el = document.getElementById('pos-content');
        var titleEl = document.getElementById('pos-title');
        
        if (!pos || !pos.entry_price) { 
            if (titleEl) titleEl.innerHTML = 'Open position';
            el.innerHTML = '<p class="no-pos">No position</p>'; 
            return; 
        }
        
        var side  = pos.side || '—';
        var entry = pos.entry_price;
        var tp    = pos.tp || pos.tp1_price;
        var sl    = pos.sl || pos.sl_price;
        var upnl  = pos.unrealized_pnl_pct;
        var cur   = pos.current_price;
        
        var sideHtml = '<span class="' + side + '" style="font-weight:bold;text-transform:uppercase;">' + side + '</span>';
        var entryHtml = '$' + Number(entry).toLocaleString(undefined,{minimumFractionDigits:1});
        var curHtml = cur ? (' <span style="color:var(--text-secondary)">· mark</span> $' + Number(cur).toLocaleString(undefined,{minimumFractionDigits:1})) : '';
        var pnlHtml = upnl != null ? (' &nbsp;<span class="' + (upnl >= 0 ? 'pos' : 'neg') + '">' + (upnl >= 0 ? '+' : '') + upnl.toFixed(2) + '%</span>') : '';
        
        if (titleEl) {
            titleEl.innerHTML = 'Open position: ' + sideHtml + ' @ ' + entryHtml + curHtml + pnlHtml;
        }

        el.innerHTML = '<div class="pos-grid" style="grid-template-columns: 1fr 1fr;">' +
            '<div class="pos-item" style="align-items:center;padding:4px 0;"><span class="pos-key" style="margin-bottom:4px;">Take Profit (TP)</span><span class="pos-val" style="color:var(--green);font-size:1.05rem;">' + (tp ? '$' + Number(tp).toLocaleString() : '—') + '</span></div>' +
            '<div class="pos-item" style="align-items:center;padding:4px 0;"><span class="pos-key" style="margin-bottom:4px;">Stop Loss (SL)</span><span class="pos-val" style="color:var(--red);font-size:1.05rem;">' + (sl ? '$' + Number(sl).toLocaleString() : '—') + '</span></div>' +
            '</div>';
    }

    if (window.ATR_BREAKOUT_MONITORING_START !== false) {
        toggleMonitor();
    } else {
        loadOnce();
    }
})();
</script>
</body>
</html>
